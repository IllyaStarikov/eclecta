name: Deploy

# Push-to-main deploys (the pipeline's data commits every ~90min) plus a
# manual lever for transient GitHub Pages failures. PRs run in pr.yml.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-test:
    runs-on: ubuntu-latest
    # A newer data commit superseding an older one's build is correct: it
    # deploys fresher data. The DEPLOY job below is never cancelled.
    concurrency:
      group: main-build
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Data-only publishes (the pipeline pushing fresh picks/digests) skip
      # the e2e suite; anything touching code still runs it.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - '**'
              - '!src/data/**'
              - '!src/content/**'
              - '!kb/**'
              - '!pipeline/kb/**'

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          # Live site: custom apex domain eclecta.co, base / (pinned by public/CNAME).
          ECLECTA_SITE: https://eclecta.co
          ECLECTA_BASE: /

      - name: Install Playwright browsers
        if: steps.changes.outputs.code == 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: steps.changes.outputs.code == 'true'
        run: npm run test:e2e

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Deploys queue and are never cancelled mid-flight; GitHub Pages
    # "deployment failed, try again later" gets one in-run retry that reuses
    # the SAME artifact (a workflow rerun would upload a duplicate).
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
