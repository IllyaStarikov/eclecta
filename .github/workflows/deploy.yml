name: Test & deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Data-only publishes (the pipeline pushing fresh picks/digests) skip
      # the e2e suite; anything touching code still runs it.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            data:
              - 'src/data/**'
              - 'src/content/**'
              - 'kb/**'
            code:
              - '**'
              - '!src/data/**'
              - '!src/content/**'
              - '!kb/**'

      - name: Type check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build
        env:
          # Live site: custom apex domain eclecta.co, base / (pinned by public/CNAME).
          ECLECTA_SITE: https://eclecta.co
          ECLECTA_BASE: /

      - name: Install Playwright browsers
        if: steps.changes.outputs.code == 'true'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: steps.changes.outputs.code == 'true'
        run: npm run test:e2e

  pytest:
    name: Pipeline tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: pipeline/requirements-dev.txt

      - name: Install test deps
        run: pip install -r pipeline/requirements-dev.txt

      # Hermetic suite only (live tests are deselected by the pyproject addopts and
      # run in the nightly live-smoke workflow instead).
      - name: Run pytest with coverage
        working-directory: pipeline
        run: |
          python -m pytest \
            --cov=signalpipe \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=pytest-report.xml

      - name: Upload coverage + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-coverage
          path: |
            pipeline/coverage.xml
            pipeline/htmlcov
            pipeline/pytest-report.xml
          if-no-files-found: warn

  deploy:
    needs: [test, pytest]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          ECLECTA_SITE: https://eclecta.co
          ECLECTA_BASE: /

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
