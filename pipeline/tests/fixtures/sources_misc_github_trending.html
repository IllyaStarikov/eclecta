<!DOCTYPE html>
<html lang="en">
<head><title>Trending repositories on GitHub today</title></head>
<body>
<div class="application-main">
  <main>
    <div class="Box">
      <div class="Box-header">
        <h2 class="f3 color-fg-muted text-normal">Trending</h2>
      </div>
      <article class="Box-row">
        <div class="float-right d-flex">
          <form action="/torvalds/linux/star" accept-charset="UTF-8" method="post">
            <button type="submit" class="btn btn-sm">Star</button>
          </form>
        </div>
        <h2 class="h3 lh-condensed">
          <a href="/torvalds/linux" data-view-component="true" class="Link">
            <span class="text-normal">torvalds /</span>
            linux
          </a>
        </h2>
        <p class="col-9 color-fg-muted my-1 pr-4">
          Linux kernel source tree
        </p>
        <div class="f6 color-fg-muted mt-2">
          <a href="/torvalds/linux/stargazers" class="Link--muted d-inline-block mr-3">189,432</a>
          <span class="d-inline-block float-sm-right">
            <svg aria-label="star"></svg>
            1,234 stars today
          </span>
        </div>
      </article>
      <article class="Box-row">
        <div class="float-right d-flex">
          <form action="/rust-lang/rust/star" accept-charset="UTF-8" method="post">
            <button type="submit" class="btn btn-sm">Star</button>
          </form>
        </div>
        <h2 class="h3 lh-condensed">
          <a href="/rust-lang/rust" data-view-component="true" class="Link">
            <span class="text-normal">rust-lang /</span>
            rust
          </a>
        </h2>
        <p class="col-9 color-fg-muted my-1 pr-4">
          A <a href="/rust-lang/rust/wiki">safe</a>, concurrent   language
        </p>
        <div class="f6 color-fg-muted mt-2">
          <a href="/rust-lang/rust/stargazers" class="Link--muted d-inline-block mr-3">98,120</a>
          <span class="d-inline-block float-sm-right">
            <svg aria-label="star"></svg>
            56 stars today
          </span>
        </div>
      </article>
      <article class="Box-row">
        <div class="float-right d-flex">
          <form action="/python/cpython/star" accept-charset="UTF-8" method="post">
            <button type="submit" class="btn btn-sm">Star</button>
          </form>
        </div>
        <h2 class="h3 lh-condensed">
          <a href="/python/cpython" data-view-component="true" class="Link">
            <span class="text-normal">python /</span>
            cpython
          </a>
        </h2>
        <p class="col-9 color-fg-muted my-1 pr-4">
          The Python programming language
        </p>
        <div class="f6 color-fg-muted mt-2">
          <a href="/python/cpython/stargazers" class="Link--muted d-inline-block mr-3">62,004</a>
          <span class="d-inline-block float-sm-right">
            <svg aria-label="star"></svg>
            1 star today
          </span>
        </div>
      </article>
    </div>
  </main>
</div>
</body>
</html>
